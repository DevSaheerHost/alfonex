name: Build Android AAB

on:
  workflow_dispatch:          # run manually from GitHub → Actions tab
  push:
    branches: [main]          # auto-build on every push to main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── 3. Java (required by Gradle) ─────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # ── 4. Sync Capacitor using local binary (avoids npx version mismatch) ───
      - name: Capacitor sync
        run: |
          node --version
          mkdir -p android/app/src/main/assets
          ./node_modules/.bin/cap sync android

      # ── 5. Decode keystore from GitHub Secret ─────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/alfonex-release.jks

      # ── 6. Build signed release AAB ──────────────────────────────────────────
      - name: Build release AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -PKEYSTORE_PATH=alfonex-release.jks \
            -PKEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -PKEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"

      # ── 7. Upload AAB as downloadable artifact ────────────────────────────────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: alfonex-release-${{ github.run_number }}.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
