name: Build iOS IPA

on:
  workflow_dispatch:          # manual trigger only (requires Mac runner)

jobs:
  build:
    runs-on: macos-latest     # iOS builds MUST run on macOS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capacitor sync
        run: npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build iOS archive
        run: |
          cd ios/App
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -archivePath build/Alfonex.xcarchive \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # Note: For a real App Store submission you need an Apple Developer
      # certificate + provisioning profile added as GitHub Secrets.
      # This build produces an unsigned archive for testing.

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: alfonex-ios-${{ github.run_number }}
          path: ios/App/build/Alfonex.xcarchive
          retention-days: 14
